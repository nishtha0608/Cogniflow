version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cogniflow
      POSTGRES_PASSWORD: cogniflow
      POSTGRES_DB: cogniflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cogniflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cogniflow:cogniflow@db:5432/cogniflow
      SECRET_KEY: cogniflow-dev-secret-key-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      UPLOAD_DIR: /tmp/uploads
      API_BASE_URL: http://localhost:8000
      REDIS_URL: redis://redis:6379/0
      DEMO_USER_EMAIL: demo@cogniflow.ai
      DEMO_USER_PASSWORD: demo123456
      DEMO_USER_NAME: Demo Researcher
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  uploads_data:
